<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Run 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background:#050510; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; touch-action:none; user-select:none; -webkit-user-select:none; }
canvas { display:block; max-width:100vw; max-height:100vh; cursor:pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 720;
canvas.width = W; canvas.height = H;

function resize() {
  const s = Math.min(window.innerWidth/W, window.innerHeight/H, 2);
  canvas.style.width = (W*s)+'px'; canvas.style.height = (H*s)+'px';
}
window.addEventListener('resize', resize);
resize();

// Audio
const AC = window.AudioContext || window.webkitAudioContext;
let actx = null;
function initAudio() { if (!actx) actx = new AC(); }
function tone(f,d,t,v,dl) {
  if (!actx) return;
  const now = actx.currentTime+(dl||0);
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = t||'square'; o.frequency.setValueAtTime(f,now);
  g.gain.setValueAtTime(v||0.08,now);
  g.gain.exponentialRampToValueAtTime(0.0001,now+d);
  o.connect(g); g.connect(actx.destination);
  o.start(now); o.stop(now+d);
}
const sfx = {
  jump(){tone(420,0.05,'sine',0.1);setTimeout(()=>tone(640,0.04,'sine',0.06),25);},
  land(){tone(180,0.06,'sine',0.07);},
  step(){tone(140,0.025,'square',0.03);},
  score(){tone(900,0.06,'sine',0.07);setTimeout(()=>tone(1150,0.08,'sine',0.05),60);},
  die(){tone(180,0.3,'sawtooth',0.1);setTimeout(()=>tone(90,0.4,'sawtooth',0.08),90);},
  woosh(){tone(220,0.12,'sine',0.035);},
  switch_(){tone(500,0.04,'sine',0.05);tone(700,0.03,'sine',0.04);},
};

// Camera follows the player dynamically — true 3D
const LANES = 3, LANE_W = 80, SEG_Z = 120, VIEW_DIST = 5000;
const FOCAL = 650, CAM_Y = -130, CAM_DIST = 350;
const GRAV = 0.68, JUMP_V = -10.5;

const levels = [
  {name:'Tutorial', len:2500, spd:5,  max:8,  gr:0.02, gap:0.05, dbl:0.07, safe:18, hue:220, reward:5,  tunHue:220, bg:['#0c0c28','#080820','#020210'], style:'default'},
  {name:'First Steps', len:3500, spd:7,  max:12, gr:0.04, gap:0.08, dbl:0.12, safe:8, hue:190, reward:10, tunHue:190, bg:['#0c1c1c','#081414','#020a0a'], style:'grid'},
  {name:'Speed Up',    len:4500, spd:9,  max:16, gr:0.06, gap:0.10, dbl:0.16, safe:6, hue:140, reward:15, tunHue:140, bg:['#0c1c0c','#081408','#020a02'], style:'neon'},
  {name:'Getting Tough',len:6000,spd:11, max:20, gr:0.08, gap:0.13, dbl:0.20, safe:5, hue:30, reward:20, tunHue:30, bg:['#1c140c','#140e08','#0a0802'], style:'checker'},
  {name:'Halfway',    len:7500, spd:13, max:24, gr:0.10, gap:0.16, dbl:0.26, safe:4, hue:200, reward:25, tunHue:200, bg:['#0c1420','#080e18','#020810'], style:'crystal'},
  {name:'Tunnel Rush',len:9000, spd:15, max:28, gr:0.12, gap:0.19, dbl:0.30, safe:3, hue:40, reward:30, tunHue:40, bg:['#1c1408','#140e04','#0a0802'], style:'glow'},
  {name:'Inferno',    len:11000,spd:17, max:32, gr:0.14, gap:0.22, dbl:0.36, safe:3, hue:0, reward:35, tunHue:0, bg:['#1c0808','#140404','#0a0202'], style:'lava'},
  {name:'Void',       len:14000,spd:19, max:36, gr:0.16, gap:0.26, dbl:0.42, safe:2, hue:280, reward:50, tunHue:260, bg:['#0c0814','#08040e','#040208'], style:'void'},
];

let state = 'menu';
let speed, playerLane, playerY, playerVY, ptx, px, pz, onGround;
let segments = [], nsz = 0, dist = 0, stTimer = 0;
let deathTimer = 0, fadeA = 0, shakeX = 0, shakeY = 0;
let menuT = 0, scorePop = 0, fallFrames = 0, gapExtend = 0, gapExtendPattern = null;
let trail = [], camZ = -CAM_DIST;
let currentLevel = 0, lvComplete = 0, lvScore = 0;
let unlockedLevel = parseInt(localStorage.getItem('run3d_unlocked'))||1;
let levelBest = [];
for (let i=0;i<levels.length;i++) levelBest.push(parseInt(localStorage.getItem('run3d_lv_'+i))||0);

let coins = parseInt(localStorage.getItem('run3d_coins'))||0;
let coinPop = 0;
let completedLevels = {};
try { completedLevels = JSON.parse(localStorage.getItem('run3d_completed'))||{}; } catch(e) {}
let levelCoins = []; // coins scattered on current level

// Stars in world coords — we cycle them as camera moves
let stars = [];
function initStars() {
  stars = [];
  for (let i=0;i<250;i++) spawnStar(true);
}
function spawnStar(init) {
  const baseZ = init ? 0 : (camZ + 500);
  stars.push({
    x:(Math.random()-0.5)*10000, y:(Math.random()-0.5)*6000+500,
    z: baseZ + Math.random()*8000 + 500,
    r:Math.random()*2.5+0.5, a:Math.random()*6.28, s:Math.random()*0.005+0.002,
  });
}
initStars();

let particles = [];

function emit(x,y,z,n,cols,spd) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*6.28,a2=Math.random()*6.28,s=(Math.random()*0.7+0.3)*(spd||4);
    const c=cols[Math.floor(Math.random()*cols.length)];
    particles.push({x,y,z,vx:Math.cos(a)*s*0.5,vy:Math.sin(a2)*s,vz:Math.sin(a)*s*0.5,r:Math.random()*3+1.5,color:c,life:1,maxLife:1});
  }
}

// Project world z to camera space
function scFromZ(worldZ) {
  const relZ = worldZ - camZ;
  return relZ > 0 ? { sc: FOCAL/relZ, relZ } : null;
}

function segAt(z) {
  for (const s of segments) if (z >= s.z && z < s.z + SEG_Z) return s;
  return null;
}

function createSeg(z) {
  const lv = levels[currentLevel];
  const safe = z < SEG_Z * lv.safe;
  const lanes = [true, true, true];
  if (!safe) {
    const prog = Math.min(1, z / (lv.len * 0.8));
    if (gapExtend > 0) {
      gapExtend--;
      const pat = gapExtendPattern;
      for (let i=0;i<3;i++) if (!pat[i]) lanes[i]=false;
    } else {
      const r = Math.random();
      const sCut = lv.gap + prog * 0.10;
      const dCut = sCut + lv.dbl + prog * 0.06;
      if (r < sCut) {
        const li=Math.floor(Math.random()*3); lanes[li]=false;
        if (Math.random() < 0.15 + prog * 0.3) {
          gapExtend=1+Math.floor(Math.random()*(1+Math.floor(prog*2)));
          gapExtendPattern=[...lanes];
        }
      } else if (r < dCut) {
        const a=Math.floor(Math.random()*3);
        let b=Math.floor(Math.random()*3);
        while(b===a)b=Math.floor(Math.random()*3);
        lanes[a]=false; lanes[b]=false;
        if (Math.random() < 0.1 + prog * 0.2) {
          gapExtend=1+Math.floor(Math.random()*(1+Math.floor(prog*1.5)));
          gapExtendPattern=[...lanes];
        }
      }
    }
  }
  const hue = (Math.floor(z/150)*40 + lv.hue) % 360;
  const cols = [];
  for (let i=0;i<3;i++) {
    const h = (hue+i*25)%360;
    cols.push({ t:`hsl(${h},85%,58%)`, f:`hsl(${h},75%,42%)`, g:`hsla(${h},100%,65%,0.35)` });
  }
  const coins = [];
  for (let i=0;i<3;i++) {
    if (lanes[i] && Math.random()<0.18) {
      coins.push({ lane:i, z:z+Math.random()*SEG_Z, collected:false });
    }
  }
  return {z,lanes,cols,coins};
}

function generateSegs() {
  while (nsz < pz + VIEW_DIST) { const seg=createSeg(nsz); segments.push(seg); for (const c of seg.coins) levelCoins.push(c); nsz += SEG_Z; }
  segments = segments.filter(s => s.z > pz - SEG_Z*5);
  levelCoins = levelCoins.filter(c => c.z > pz - SEG_Z*2 && !c.collected);
}

function lx(i) { return (i-1)*LANE_W; }

function resetGame(lvl) {
  currentLevel = lvl;
  const lv = levels[lvl];
  pz=0; px=0; ptx=0; playerLane=1; playerY=0; playerVY=0; onGround=true;
  score=0; lvScore=0; dist=0; speed=lv.spd; segments=[]; nsz=0; particles=[]; trail=[];
  deathTimer=0; fadeA=0; shakeX=0; shakeY=0; stTimer=0; scorePop=0; fallFrames=0; gapExtend=0;
  levelCoins=[]; lvComplete=0;
  camZ = -CAM_DIST;
  generateSegs();
}

function handleInput() {
  initAudio();
  if (state==='menu') { if (currentLevel>=0) { resetGame(currentLevel); state='playing'; sfx.woosh(); } return; }
  if (state==='levelcomplete' && lvComplete>40) {
    if (currentLevel+1<levels.length) { resetGame(currentLevel+1); state='playing'; sfx.woosh(); }
    else { state='menu'; }
    return;
  }
  if (state==='gameover' && deathTimer>25) { state='menu'; return; }
  if (state==='playing' && onGround) {
    playerVY = JUMP_V; onGround = false;
    sfx.jump();
    emit(px,0,pz,10,['rgba(255,255,255,0.5)','rgba(100,200,255,0.3)'],3);
  }
}

function moveLane(d) {
  if (state!=='playing') return;
  const nl = Math.max(0, Math.min(2, playerLane+d));
  if (nl!==playerLane) { playerLane=nl; ptx=lx(nl); sfx.switch_(); }
}

function update() {
  menuT += 0.02;

  if (state==='menu') {
    camZ = -CAM_DIST; // menu default camera
    updateP();
    updateStars();
    return;
  }

  if (state==='playing') {
    camZ = pz - CAM_DIST;
    const lv = levels[currentLevel];
    speed = Math.min(lv.max, lv.spd + dist * lv.gr * 0.01);
    pz += speed;
    dist += speed;
    px += (ptx - px) * 0.16;

    playerVY += GRAV;
    playerY += playerVY;

    const curSeg = segAt(pz);
    const onPlat = curSeg && curSeg.lanes[playerLane];

    if (!onGround && playerY > 0) {
      fallFrames++;
      if (fallFrames > 10 || playerY > 120) die();
    }

    if (onPlat && playerY >= 0 && playerY < 20) {
      playerY = 0; playerVY = 0; fallFrames = 0;
      if (!onGround) {
        onGround=true; sfx.land();
        emit(px,2,pz,8,['rgba(255,255,255,0.4)','rgba(100,200,255,0.2)'],2);
      }
    } else if (onGround) {
      onGround=false; playerVY = 4; fallFrames = 0;
    }

    if (onGround && speed>5) { stTimer+=speed; if (stTimer>40) { stTimer=0; sfx.step(); } }

    if (onGround && Math.random()<0.5+speed*0.02) {
      const fr=Math.random()*2+1;
      trail.push({x:px+(Math.random()-0.5)*12,y:1+Math.random()*3,z:pz-10,life:1,r:fr,
        h:20+Math.random()*30,s:80+Math.random()*20,l:50+Math.random()*30});
    }
    for (let i=trail.length-1;i>=0;i--) { trail[i].life-=0.04; if (trail[i].life<=0) trail.splice(i,1); }

    // Coin collection
    for (const c of levelCoins) {
      if (!c.collected && c.lane===playerLane && Math.abs(c.z-pz)<SEG_Z*0.5 && playerY<10) {
        c.collected=true; coins++; coinPop=20;
        sfx.score();
        emit(px,8,c.z,8,['#ffd700','#fff8b0','#ffaa00'],2);
      }
    }
    if (coinPop>0) coinPop--;

    const ns = Math.floor(dist/10);
    if (ns>score) { score=ns; scorePop=15; sfx.score(); emit(px,20,pz,6,['#ffe066','#ffd700','#fff'],3); }
    if (scorePop>0) scorePop--;

    generateSegs();

    if (dist >= levels[currentLevel].len) {
      state='levelcomplete'; lvComplete=0; lvScore=score;
      let isNewBest = false;
      if (score > levelBest[currentLevel]) {
        levelBest[currentLevel]=score;
        localStorage.setItem('run3d_lv_'+currentLevel, score);
        isNewBest = true;
      }
      if (currentLevel+1 < levels.length && currentLevel+1 >= unlockedLevel) {
        unlockedLevel = currentLevel+1;
        localStorage.setItem('run3d_unlocked', unlockedLevel);
      }
      if (!completedLevels[currentLevel]) {
        completedLevels[currentLevel] = true;
        localStorage.setItem('run3d_completed', JSON.stringify(completedLevels));
        coins += levels[currentLevel].reward;
        localStorage.setItem('run3d_coins', coins);
        coinPop = 30;
      }
    }
  }

  if (state==='levelcomplete') {
    lvComplete++;
    camZ = pz - CAM_DIST;
    updateP();
    updateStars();
    return;
  }

  if (state==='gameover') {
    camZ = pz - CAM_DIST;
    deathTimer++;
    playerY+=playerVY; playerVY+=0.5;
    if (fadeA<1) fadeA+=0.02;
    shakeX*=0.85; shakeY*=0.85;
  }

  if (shakeX>0.1) shakeX*=0.9; else shakeX=0;
  if (shakeY>0.1) shakeY*=0.9; else shakeY=0;
  updateP();
  updateStars();
}

function updateStars() {
  for (let i=stars.length-1;i>=0;i--) {
    if (stars[i].z < camZ - 500) { stars.splice(i,1); spawnStar(false); }
  }
}

function updateP() {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.z+=p.vz;
    p.vy+=0.03; p.life-=0.025;
    if (p.life<=0||Math.abs(p.z-camZ)>VIEW_DIST*2) particles.splice(i,1);
  }
}

function die() {
  if (state==='gameover') return;
  state='gameover'; deathTimer=0; fadeA=0;
  sfx.die(); shakeX=14; shakeY=14;
  emit(px,playerY,pz,50,['#ff6b6b','#ff4466','#ff8866','#ffe066','#fff'],6);
  if (score>levelBest[currentLevel]) {
    levelBest[currentLevel]=score;
    localStorage.setItem('run3d_lv_'+currentLevel, score);
  }
}

function screenPos(worldX, worldY, worldZ) {
  const s = scFromZ(worldZ);
  if (!s) return null;
  return {
    x: W/2 + worldX * s.sc,
    y: H/2 + (worldY - CAM_Y) * s.sc,
    sc: s.sc, relZ: s.relZ,
  };
}

function draw() {
  ctx.save();

  if (shakeX>0.5||shakeY>0.5)
    ctx.translate((Math.random()-0.5)*shakeX*2,(Math.random()-0.5)*shakeY*2);

  // Background
  const lvb = state==='menu'||currentLevel<0 ? ['#0c0c28','#080820','#020210'] : levels[currentLevel].bg;
  const bg=ctx.createRadialGradient(W/2,H/2,50,W/2,H/2,500);
  bg.addColorStop(0,lvb[0]); bg.addColorStop(0.4,lvb[1]); bg.addColorStop(1,lvb[2]);
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Stars — 3D with camera tracking
  for (const s of stars) {
    const p = screenPos(s.x, s.y, s.z);
    if (!p || p.x<-80||p.x>W+80||p.y<-80||p.y>H+80) continue;
    s.a += s.s;
    const tw = (Math.sin(s.a)*0.5+0.5)*0.7+0.3;
    ctx.globalAlpha = tw*0.7;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(p.x, p.y, s.r*Math.max(0.2,p.sc*2), 0, 6.28); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Tunnel
  drawTunnel();
  for (const t of trail) drawTrail(t);

  // Segments sorted far→near (painter's algorithm)
  const vs = segments.filter(s => s.z + SEG_Z > camZ && s.z < pz + VIEW_DIST).sort((a,b)=>b.z-a.z);
  for (const s of vs) drawSeg(s);

  // Coins
  for (const c of levelCoins) if (!c.collected && c.z > camZ && c.z < pz+200) drawCoin(c);

  for (const p of particles) if (p.z<=pz+30) drawP(p);

  if (state!=='gameover'||deathTimer<50) drawPlayer();
  for (const p of particles) if (p.z>pz+30) drawP(p);

  // Tutorial prompts
  if (state==='playing' && currentLevel===0) {
    let tip = '', tipY = 110;
    if (dist < 150) {
      tip = 'Use \u2190 \u2192 or A/D to switch lanes';
    } else if (dist < 400) {
      tip = 'Try moving to each lane \u2014 stay on the path!';
    } else if (dist < 700) {
      tip = 'Press \u2191 or SPACE to jump';
    } else if (dist < 1000) {
      tip = 'Good! Jump over the gaps coming up!';
    } else if (dist < 1400) {
      tip = 'Watch for missing platforms \u2014 jump or switch!';
    } else if (dist < 1800) {
      tip = 'You\u2019re doing great! Keep going!';
    } else if (dist < 2300) {
      tip = 'Almost through the tutorial!';
    }
    if (tip) {
      ctx.save();
      const ta = dist<100?dist/100:1;
      ctx.globalAlpha = ta * 0.6;
      ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=12;
      ctx.fillStyle='#fff';
      ctx.font='bold 14px "Segoe UI",system-ui,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(tip, W/2, tipY);
      ctx.restore();
    }
  }

  if (state==='gameover') drawGameOver();
  if (state==='levelcomplete') drawLevelComplete();
  drawUI();
  if (state==='menu') drawMenu();

  ctx.restore();
}

function drawTunnel() {
  ctx.save();
  const lv = state==='playing'||state==='gameover'||state==='levelcomplete' ? levels[currentLevel] : null;
  const th = lv ? lv.tunHue : 220;
  for (let i=0;i<28;i++) {
    const t = i/28;
    const worldZ = state==='menu' ? 5000 + i * 300 : pz + t * 5500;
    const p = screenPos(0, 0, worldZ);
    if (!p) continue;
    const w = 380 * p.sc * 1.8, cx = W/2, cy = p.y;
    const a = (1-t*0.8) * 0.05;

    ctx.strokeStyle = `hsla(${th+30},80%,60%,${a})`;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = a*2;
    ctx.beginPath(); ctx.ellipse(cx, cy, w, w*0.35, 0, 0, 6.28); ctx.stroke();
  }
  if (coinPop>0) {
    ctx.save();
    ctx.globalAlpha=Math.min(1,coinPop/30);
    ctx.shadowColor='rgba(255,215,0,0.5)'; ctx.shadowBlur=25;
    ctx.fillStyle='#ffd700';
    ctx.font='bold 14px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('\u25CB +'+levels[currentLevel].reward, W/2, 60);
    ctx.restore();
  }

  ctx.globalAlpha=1;
  ctx.restore();
}

function drawCoin(c) {
  const p = screenPos(lx(c.lane), 0, c.z);
  if (!p) return;
  const sc = p.sc;
  const wobble=Math.sin(menuT*3+c.z*0.01)*2;
  ctx.save();
  ctx.translate(p.x, p.y-8*sc+wobble);
  ctx.scale(sc,sc);
  const r=7;
  ctx.shadowColor='rgba(255,215,0,0.4)'; ctx.shadowBlur=12;
  const grd=ctx.createRadialGradient(-1,-2,1,0,0,r);
  grd.addColorStop(0,'#fff8b0'); grd.addColorStop(0.3,'#ffd700'); grd.addColorStop(1,'#cc8800');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.arc(0,0,r,0,6.28); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(180,120,20,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(0,0,r,0,6.28); ctx.stroke();
  ctx.fillStyle='rgba(255,200,0,0.3)';
  ctx.font='bold 8px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('$',0,1);
  ctx.restore();
}

function drawSeg(seg) {
  const {z,lanes,cols}=seg;
  const rows = 6;
  const step = SEG_Z / rows;

  const sqW = LANE_W * 0.88;
  const sqH = sqW * 0.35;
  const lv = levels[currentLevel];

  for (let r = rows - 1; r >= 0; r--) {
    const rowZ = z + r * step;
    const p = screenPos(0, 0, rowZ);
    if (!p) continue;
    const baseY = p.y;
    const sc = p.sc;

    for (let i=0;i<3;i++) {
      if (!lanes[i]) continue;
      const sx = W/2 + lx(i)*sc;
      const c = cols[i];
      const w = sqW * sc;
      const h = sqH * sc;

      ctx.fillStyle = `hsla(0,0%,0%,${0.25*sc})`;
      ctx.fillRect(sx - w/2 + 2*sc, baseY - h + 2*sc, w, h);

      ctx.shadowColor = c.g; ctx.shadowBlur = 12*sc;
      const hue = parseInt(c.t.match(/\d+/)[0]) || 220;

      const grd = ctx.createLinearGradient(sx, baseY-h, sx, baseY);
      grd.addColorStop(0, `hsl(${hue+20},92%,68%)`);
      grd.addColorStop(0.3, c.t);
      grd.addColorStop(1, `hsl(${hue},78%,45%)`);
      ctx.fillStyle = grd;
      ctx.fillRect(sx - w/2, baseY - h, w, h);
      ctx.shadowBlur = 0;

      if (lv.style==='glow') {
        ctx.shadowColor = `hsla(${hue+30},100%,70%,0.5)`;
        ctx.shadowBlur = 20*sc;
        ctx.strokeStyle = `hsla(${hue+30},100%,80%,${0.5*sc})`;
        ctx.lineWidth = Math.max(0.5, 2*sc);
        ctx.strokeRect(sx - w/2, baseY - h, w, h);
        ctx.shadowBlur = 0;
      } else {
        ctx.strokeStyle = `hsla(${hue+30},100%,80%,${0.25*sc})`;
        ctx.lineWidth = Math.max(0.5, 1.2*sc);
        ctx.strokeRect(sx - w/2, baseY - h, w, h);
      }

      ctx.fillStyle = `hsla(${hue+30},100%,90%,${0.2*sc})`;
      ctx.fillRect(sx - w/2 + 3*sc, baseY - h + 2*sc, w - 6*sc, 2.5*sc);

      // Style-specific decorations
      if (lv.style==='grid') {
        ctx.strokeStyle = `hsla(${hue+30},50%,80%,${0.1*sc})`;
        ctx.lineWidth = Math.max(0.3, 0.5*sc);
        ctx.beginPath();
        ctx.moveTo(sx - w/2 + w*0.33, baseY - h);
        ctx.lineTo(sx - w/2 + w*0.33, baseY);
        ctx.moveTo(sx - w/2 + w*0.66, baseY - h);
        ctx.lineTo(sx - w/2 + w*0.66, baseY);
        ctx.moveTo(sx - w/2, baseY - h*0.5);
        ctx.lineTo(sx + w/2, baseY - h*0.5);
        ctx.stroke();
      }
      if (lv.style==='neon') {
        ctx.shadowColor = `hsla(${hue+30},100%,60%,0.6)`;
        ctx.shadowBlur = 15*sc;
        ctx.fillStyle = `hsla(${hue+30},100%,90%,${0.15*sc})`;
        ctx.fillRect(sx - w/2 + 2*sc, baseY - h + 2*sc, w - 4*sc, h - 4*sc);
        ctx.shadowBlur = 0;
      }
      if (lv.style==='checker') {
        ctx.fillStyle = `hsla(0,0%,0%,${0.08*sc})`;
        const cs = w*0.25;
        for (let ci=0;ci<4;ci++) {
          for (let cj=0;cj<2;cj++) {
            if ((ci+cj)%2===0) continue;
            ctx.fillRect(sx - w/2 + ci*cs, baseY - h + cj*h*0.5, cs, h*0.5);
          }
        }
      }
      if (lv.style==='crystal') {
        ctx.fillStyle = `hsla(0,0%,100%,${0.08*sc})`;
        ctx.fillRect(sx - w/2 + 4*sc, baseY - h + 4*sc, w - 8*sc, h - 8*sc);
        ctx.strokeStyle = `hsla(${hue+60},80%,90%,${0.3*sc})`;
        ctx.lineWidth = Math.max(0.3, 0.5*sc);
        ctx.beginPath();
        ctx.moveTo(sx - w/2 + 2*sc, baseY - h + 2*sc);
        ctx.lineTo(sx + w/2 - 2*sc, baseY - h + 2*sc);
        ctx.stroke();
      }
      if (lv.style==='lava') {
        ctx.strokeStyle = `hsla(${hue+40},100%,55%,${0.2*sc})`;
        ctx.lineWidth = Math.max(0.3, 0.5*sc);
        for (let li=0;li<3;li++) {
          const lx2 = sx - w/2 + Math.random()*w;
          const ly = baseY - Math.random()*h;
          ctx.beginPath();
          ctx.moveTo(lx2, ly);
          ctx.lineTo(lx2 + Math.random()*6*sc - 3*sc, ly - Math.random()*4*sc);
          ctx.stroke();
        }
      }
      if (lv.style==='void') {
        ctx.fillStyle = `hsla(0,0%,100%,${0.06*sc})`;
        for (let si=0;si<2;si++) {
          const sx2 = sx - w/2 + Math.random()*w;
          const sy2 = baseY - Math.random()*h;
          ctx.beginPath(); ctx.arc(sx2, sy2, Math.max(0.3, 0.5*sc), 0, 6.28); ctx.fill();
        }
      }
    }
  }
}

function drawPlayer() {
  // Player is always at pz, which is CAM_DIST ahead of camera
  const p = screenPos(px, 0, pz);
  if (!p) return;
  const groundY = p.y - 16*p.sc;
  const ppy = groundY + playerY*p.sc - 47*p.sc;

  ctx.save();
  ctx.translate(p.x, ppy);
  ctx.scale(p.sc, p.sc);

  const bob = onGround ? Math.sin(dist*0.018)*2 : 0;
  const hue = 220;

  // Legs
  ctx.fillStyle=`hsl(${hue},55%,35%)`;
  const ll = 17+bob;
  ctx.fillRect(-7,18,6,ll);
  ctx.fillRect(1,18,6,ll);

  // Boots
  ctx.fillStyle=`hsl(${hue},45%,25%)`;
  ctx.fillRect(-8,18+ll-3,8,4);
  ctx.fillRect(0,18+ll-3,8,4);

  // Body — extended to connect seamlessly with legs
  ctx.shadowColor='rgba(100,180,255,0.35)'; ctx.shadowBlur=18;
  ctx.fillStyle=`hsl(${hue+10},70%,52%)`;
  ctx.beginPath(); ctx.roundRect(-9,-22,18,42,5); ctx.fill();

  // Belt / waist
  ctx.shadowBlur=0;
  ctx.fillStyle=`hsl(${hue},50%,30%)`;
  ctx.fillRect(-9,14,18,5);

  // Chest core
  ctx.fillStyle=`hsl(${hue+60},100%,65%)`;
  ctx.beginPath(); ctx.arc(0,-8,4,0,6.28); ctx.fill();
  ctx.fillStyle=`hsl(${hue+60},100%,85%)`;
  ctx.beginPath(); ctx.arc(0,-8,2,0,6.28); ctx.fill();

  // Arms
  const as=onGround?Math.sin(dist*0.018)*4:0;
  ctx.fillStyle=`hsl(${hue+5},55%,40%)`;
  ctx.save(); ctx.translate(-9,-16); ctx.rotate(-0.25+as*0.02); ctx.fillRect(-3,0,5,15); ctx.restore();
  ctx.save(); ctx.translate(9,-16); ctx.rotate(0.25-as*0.02); ctx.fillRect(-2,0,5,15); ctx.restore();

  // Gloves
  ctx.fillStyle=`hsl(${hue+5},45%,30%)`;
  ctx.save(); ctx.translate(-9,-16); ctx.rotate(-0.25+as*0.02); ctx.fillRect(-3,13,5,3); ctx.restore();
  ctx.save(); ctx.translate(9,-16); ctx.rotate(0.25-as*0.02); ctx.fillRect(-2,13,5,3); ctx.restore();

  // Helmet
  ctx.shadowColor='rgba(130,190,255,0.4)'; ctx.shadowBlur=22;
  const hgrd=ctx.createRadialGradient(-2,-28,1,0,-24,13);
  hgrd.addColorStop(0,`hsl(${hue+25},90%,72%)`);
  hgrd.addColorStop(0.6,`hsl(${hue+15},80%,58%)`);
  hgrd.addColorStop(1,`hsl(${hue+5},70%,42%)`);
  ctx.fillStyle=hgrd;
  ctx.beginPath(); ctx.arc(0,-26,13,0,6.28); ctx.fill();
  ctx.shadowBlur=0;

  // Visor
  ctx.fillStyle=`hsla(${hue+60},100%,72%,0.75)`;
  ctx.beginPath(); ctx.roundRect(-8,-31,16,7,3); ctx.fill();
  ctx.fillStyle=`hsla(${hue+60},100%,85%,0.25)`;
  ctx.beginPath(); ctx.roundRect(-6,-30,12,3,2); ctx.fill();

  // Backpack
  ctx.fillStyle=`hsl(${hue+10},50%,35%)`;
  ctx.fillRect(-11,-17,3,18); ctx.fillRect(8,-17,3,18);

  // Fire exhaust below boots
  if (state==='playing') {
    const fi = onGround ? Math.max(0,(speed-5)/30) : 1;
    if (fi>0.05) {
      ctx.shadowColor='rgba(255,120,30,0.6)';
      for (let f=0;f<12;f++) {
        const fx=-7+f*1.3+Math.random()*2;
        const fh=(2+Math.random()*16)*fi;
        const fw=1+Math.random()*3;
        ctx.shadowBlur=12+Math.random()*18;
        ctx.globalAlpha=0.2+Math.random()*0.5;
        ctx.fillStyle=`hsl(${15+Math.random()*35},100%,${50+Math.random()*35}%)`;
        ctx.fillRect(fx,37+bob,fw,fh);
      }
      ctx.shadowBlur=0;
      ctx.globalAlpha=1;
    }
  }

  ctx.restore();
}

function drawTrail(t) {
  const p = screenPos(t.x, t.y, t.z);
  if (!p) return;
  ctx.globalAlpha = t.life*0.4;
  ctx.fillStyle=`hsla(${t.h||200},${t.s||80}%,${t.l||60}%,0.5)`;
  ctx.shadowColor=`hsla(${t.h||200},100%,60%,0.3)`;
  ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5,t.r*p.sc), 0, 6.28); ctx.fill();
  ctx.shadowBlur=0;
  ctx.globalAlpha=1;
}

function drawP(p) {
  const sp = screenPos(p.x, p.y, p.z);
  if (!sp) return;
  if (sp.x<-60||sp.x>W+60||sp.y<-60||sp.y>H+60) return;
  ctx.globalAlpha = Math.max(0, p.life/p.maxLife);
  ctx.fillStyle = p.color;
  ctx.beginPath(); ctx.arc(sp.x, sp.y, Math.max(0.3,p.r*sp.sc), 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawUI() {
  if (state==='menu'||state==='levelcomplete') return;
  ctx.save();

  ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=15;
  ctx.fillStyle='#fff';
  ctx.font='bold 36px "Segoe UI",system-ui,sans-serif';

  ctx.font='10px "Segoe UI",system-ui,sans-serif';

  if (state==='playing') {
    const lv=levels[currentLevel];
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.font='9px "Segoe UI",system-ui,sans-serif';

    ctx.fillStyle='rgba(255,215,0,0.4)';
    ctx.font='9px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='right'; ctx.textBaseline='top';
    ctx.fillText('\u25CB '+coins, 130, 12);

    ctx.fillStyle='rgba(255,255,255,0.1)';

    ctx.textAlign='right'; ctx.textBaseline='top';
    ctx.fillText(Math.round(speed)+' SPD', W-12, 12);

    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.fillRect(bx,by,bw,bh);

    ctx.fillStyle='rgba(255,255,255,0.08)';

    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(Math.round(pct*100)+'%', W/2, by+7);
  }

  if (state==='playing') {
    const dy=H-35;
    for (let i=0;i<3;i++) {
      const dx=W/2+(i-1)*28;
      const active=i===playerLane;
      ctx.fillStyle=active?'rgba(100,200,255,0.9)':'rgba(255,255,255,0.1)';
      ctx.shadowColor=active?'rgba(100,200,255,0.5)':'transparent';
      ctx.shadowBlur=active?10:0;
      ctx.beginPath(); ctx.arc(dx,dy,active?5:3,0,6.28); ctx.fill();
    }
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.08)';

    ctx.globalAlpha=Math.min(1,coinPop/20);
    ctx.shadowColor='rgba(255,215,0,0.5)'; ctx.shadowBlur=20;
    ctx.fillStyle='#ffd700';
    ctx.font='bold 11px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='right'; ctx.textBaseline='top';
    ctx.fillText('+1', 140, 12);
    ctx.restore();
  }

  ctx.restore();
}

function drawMenu() {
  ctx.save();
  const v=ctx.createRadialGradient(W/2,H/2,80,W/2,H/2,400);
  v.addColorStop(0,'transparent'); v.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.fillStyle=v; ctx.fillRect(0,0,W,H);

  const pp = Math.sin(menuT*1.5)*0.05+1;
  ctx.shadowColor='rgba(80,140,255,0.7)'; ctx.shadowBlur=50;
  ctx.fillStyle='#fff';
  ctx.font='bold '+Math.round(56*pp)+'px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('RUN 3D', W/2, 55);
  ctx.shadowBlur=0;

  ctx.fillStyle='rgba(100,190,255,0.3)';
  ctx.font='11px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('SELECT LEVEL', W/2, 90);

  ctx.fillStyle='rgba(255,215,0,0.3)';
  ctx.font='10px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.fillText('\u25CB '+coins, W-12, 12);

  const startY = 120, rowH = 44;
  for (let i=0;i<levels.length;i++) {
    const lv=levels[i];
    const y=startY+i*rowH;
    const locked=i>=unlockedLevel;
    const sel=i===currentLevel&&currentLevel>=0;

    const bx=40, by=y, bw=W-80, bh=36;
    if (sel) {
      ctx.shadowColor=`hsla(${lv.hue+40},70%,50%,0.3)`;
      ctx.shadowBlur=18;
    }
    ctx.fillStyle=locked?'rgba(20,20,40,0.6)':(sel?`hsla(${lv.hue+40},50%,20%,0.7)`:'rgba(15,15,35,0.5)');
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,6); ctx.fill();
    ctx.shadowBlur=0;
    if (!locked) {
      ctx.strokeStyle=`hsla(${lv.hue+40},50%,40%,0.2)`;
      ctx.lineWidth=1;
      ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,6); ctx.stroke();
    }

    ctx.fillStyle=locked?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.7)';
    ctx.font='bold 12px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText((i+1)+'. '+lv.name, bx+12, by+18);

    if (locked) {
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.font='14px "Segoe UI",system-ui,sans-serif';
      ctx.textAlign='right'; ctx.textBaseline='middle';
      ctx.fillText('\u{1F512}', bx+bw-10, by+18);
    } else {
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.font='10px "Segoe UI",system-ui,sans-serif';
      ctx.textAlign='right'; ctx.textBaseline='middle';
      const bst=levelBest[i];
      ctx.fillText(bst>0?'Best: '+bst:'', bx+bw-10, by+18);
    }
  }

  const hintA = 0.2+0.5*Math.sin(menuT*2);
  ctx.globalAlpha=hintA;
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.font='10px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Click a level or press 1-8 to start', W/2, H-25);
  ctx.globalAlpha=1;

  ctx.restore();
}

function drawGameOver() {
  if (deathTimer<25) return;

  ctx.fillStyle=`rgba(0,0,0,${Math.min(0.6,fadeA*0.6)})`;

  const pw=290, ph=300, px=(W-pw)/2, py=(H-ph)/2;
  ctx.shadowColor='rgba(80,140,255,0.2)'; ctx.shadowBlur=40;
  const pg=ctx.createLinearGradient(px,py,px,py+ph);
  pg.addColorStop(0,'rgba(12,12,35,0.96)'); pg.addColorStop(1,'rgba(6,6,20,0.96)');
  ctx.fillStyle=pg;
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,18); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(80,140,255,0.15)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,18); ctx.stroke();

  ctx.fillStyle='#ff6b6b';
  ctx.font='bold 28px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('GAME OVER', W/2, py+42);

  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.font='10px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';

  ctx.fillText('SCORE', W/2, py+100);

  ctx.fillStyle='#fff';
  ctx.font='bold 48px "Segoe UI",system-ui,sans-serif';
  ctx.shadowColor='rgba(80,140,255,0.3)'; ctx.shadowBlur=18;
  ctx.fillText(score, W/2, py+150);
  ctx.shadowBlur=0;

  ctx.font='11px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Best: '+bst, W/2, py+185);

  const by=py+245;
  ctx.shadowColor='rgba(80,140,255,0.3)'; ctx.shadowBlur=18;
  ctx.fillStyle='rgba(80,140,255,0.12)';
  ctx.beginPath(); ctx.roundRect(W/2-80,by-16,160,32,16); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(80,140,255,0.2)'; ctx.lineWidth=1;

  ctx.font='bold '+Math.round(12*ppp)+'px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';

  ctx.restore();
}

function drawLevelComplete() {
  if (lvComplete<20) return;
  ctx.save();
  const alpha=Math.min(0.7,(lvComplete-20)/30);
  ctx.fillStyle=`rgba(0,0,0,${alpha})`;
  ctx.fillRect(0,0,W,H);

  const last=currentLevel+1>=levels.length;
  const anim=Math.min(1,(lvComplete-20)/25);

  ctx.globalAlpha=anim;
  const boxW=340, boxH=last?280:320, bx=(W-boxW)/2, by=(H-boxH)/2;
  ctx.shadowColor=`hsla(${levels[currentLevel].hue+40},60%,50%,0.3)`;
  ctx.shadowBlur=40;
  const pg=ctx.createLinearGradient(bx,by,bx,by+boxH);
  pg.addColorStop(0,'rgba(12,12,35,0.97)'); pg.addColorStop(1,'rgba(6,6,20,0.97)');
  ctx.fillStyle=pg;
  ctx.beginPath(); ctx.roundRect(bx,by,boxW,boxH,18); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle=`hsla(${levels[currentLevel].hue+40},50%,50%,0.2)`;
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(bx,by,boxW,boxH,18); ctx.stroke();

  ctx.fillStyle=last?'#ffe066':'#66ff99';
  ctx.font='bold 28px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(last?'ALL LEVELS COMPLETE!':'LEVEL COMPLETE', W/2, by+50);

  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.font='12px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(levels[currentLevel].name, W/2, by+85);

  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.font='11px "Segoe UI",system-ui,sans-serif';
  ctx.fillText('SCORE', W/2, by+125);

  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(80,140,255,0.3)'; ctx.shadowBlur=15;
  ctx.font='bold 44px "Segoe UI",system-ui,sans-serif';
  ctx.fillText(lvScore, W/2, by+170);
  ctx.shadowBlur=0;

  const bst=levelBest[currentLevel];
  if (bst>0&&lvScore>=bst) {
    ctx.fillStyle='#ffe066';
    ctx.font='bold 11px "Segoe UI",system-ui,sans-serif';
    ctx.shadowColor='rgba(255,200,50,0.4)'; ctx.shadowBlur=10;
    ctx.fillText('NEW BEST!', W/2, by+200);
    ctx.shadowBlur=0;
  }

  if (!completedLevels[currentLevel]) {
    ctx.fillStyle='rgba(255,215,0,0.5)';
    ctx.font='11px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('\u25CB +'+levels[currentLevel].reward, W/2, by+225);
  }

  const by2=by+boxH-55;
  if (!last) {
    ctx.shadowColor='rgba(80,140,255,0.3)'; ctx.shadowBlur=15;
    ctx.fillStyle='rgba(80,140,255,0.12)';
    ctx.beginPath(); ctx.roundRect(W/2-100,by2-18,200,36,18); ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(80,140,255,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(W/2-100,by2-18,200,36,18); ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.font='bold 13px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('NEXT LEVEL \u2192', W/2, by2+1);
  } else {
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.font='12px "Segoe UI",system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('TAP to return to menu', W/2, by2+1);
  }

  ctx.globalAlpha=1;
  ctx.restore();
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r) {
    if (r>w/2) r=w/2; if (r>h/2) r=h/2;
    this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+w,y,r);
    return this;
  };
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// Input
let menuSelY = 0, selLevel = -1;
document.addEventListener('keydown',e=>{
  if (e.code==='Escape') { state='menu'; e.preventDefault(); return; }
  if (state==='gameover' && deathTimer>25) {
    e.preventDefault(); resetGame(currentLevel); state='playing'; sfx.woosh(); initAudio(); return;
  }
  if (e.code==='Space'||e.code==='ArrowUp'||e.key==='w'){e.preventDefault();handleInput();}
  if (e.code==='ArrowLeft'||e.key==='a'){e.preventDefault();moveLane(-1);}
  if (e.code==='ArrowRight'||e.key==='d'){e.preventDefault();moveLane(1);}
  if (state==='menu') {
    const n=parseInt(e.key);
    if (n>=1&&n<=levels.length&&n<=unlockedLevel) {
      e.preventDefault(); currentLevel=n-1; resetGame(n-1); state='playing'; sfx.woosh(); initAudio();
    }
  }
});

let touchTime = 0;

canvas.addEventListener('click',e=>{
  e.preventDefault(); initAudio();
  if (Date.now() - touchTime < 300) return;
  const r=canvas.getBoundingClientRect();
  const sx=(e.clientX-r.left)/r.width*W;
  const sy=(e.clientY-r.top)/r.height*H;

  if (state==='menu') {
    const startY=120, rowH=44;
    for (let i=0;i<levels.length;i++) {
      const y=startY+i*rowH;
      if (sy>=y&&sy<y+36&&i<unlockedLevel) {
        currentLevel=i; resetGame(i); state='playing'; sfx.woosh(); return;
      }
    }
    return;
  }
  if (state==='gameover'&&deathTimer>25) {
    const gpy=(H-300)/2;
    if (sx>=W/2-80&&sx<=W/2+80&&sy>=gpy+229&&sy<=gpy+261) { resetGame(currentLevel); state='playing'; sfx.woosh(); return; }
    state='menu'; return;
  }
  if (state==='levelcomplete'&&lvComplete>20) {
    if (currentLevel+1<levels.length) { resetGame(currentLevel+1); state='playing'; sfx.woosh(); }
    else { state='menu'; }
    return;
  }
  handleInput();
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); initAudio();
  touchTime = Date.now();
  const t=e.changedTouches[0];
  const r=canvas.getBoundingClientRect();
  const sx=(t.clientX-r.left)/r.width*W;
  const sy=(t.clientY-r.top)/r.height*H;

  if (state==='menu') {
    const startY=120, rowH=44;
    for (let i=0;i<levels.length;i++) {
      const y=startY+i*rowH;
      if (sy>=y&&sy<y+36&&i<unlockedLevel) {
        currentLevel=i; resetGame(i); state='playing'; sfx.woosh(); return;
      }
    }
    return;
  }
  if (state==='gameover'&&deathTimer>25) {
    const gpy=(H-300)/2;
    if (sx>=W/2-80&&sx<=W/2+80&&sy>=gpy+229&&sy<=gpy+261) { resetGame(currentLevel); state='playing'; sfx.woosh(); return; }
    state='menu'; return;
  }
  if (state==='levelcomplete'&&lvComplete>20) {
    if (currentLevel+1<levels.length) { resetGame(currentLevel+1); state='playing'; sfx.woosh(); }
    else { state='menu'; }
    return;
  }
  if(sx<W*0.35)moveLane(-1);
  else if(sx>W*0.65)moveLane(1);
  else handleInput();
},{passive:false});

resetGame(0);
loop();
</script>
</body>
